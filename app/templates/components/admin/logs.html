<!-- Tab: Command Shell (Logs) -->
<div id="tab-logs" class="tab-content {% if active_admin_tab == 'logs' %}active{% endif %}">
    <div style="height: calc(100vh - 200px);">
        <!-- Terminal -->
        <div class="glass-panel" style="display: flex; flex-direction: column; overflow: hidden; height: 100%;">
            <div class="panel-header" style="background: #000;">
                <h2><i class="fas fa-terminal"></i> OCC_REMOTE_TERMINAL</h2>
                <span style="font-family: var(--font-data); font-size: 0.65rem; color: var(--primary);">[SESSION_ENCRYPTED]</span>
            </div>
            <div class="panel-content" style="background: #000; padding: 0; display: flex; flex-direction: column; flex: 1; overflow: hidden;">
                <div id="shellOutput" class="shell-output" style="flex: 1; overflow-y: auto; padding: 20px; font-family: var(--font-data); font-size: 0.85rem; color: #fff; line-height: 1.6;">
                    <div style="color: var(--primary); font-weight: 700;">- Securithon Lab v3.1 Operational Control -</div>
                    <div style="color: var(--text-muted);">- Authenticated as: SYSTEM_ADMIN -</div>
                    <br>
                </div>
                <div class="shell-input-container" style="border: none; border-top: 1px solid rgba(255,255,255,0.05); background: #050505; padding: 12px 20px; display: flex; align-items: center; gap: 10px;">
                    <span class="prompt" style="color: var(--primary); font-weight: 700; font-family: var(--font-data);">admin@occ:~$</span>
                    <input type="text" id="shellInput" style="background: transparent; border: none; color: #fff; outline: none; flex: 1; font-family: var(--font-data); font-size: 0.85rem;" placeholder="Enter command..." autocomplete="off">
                </div>
            </div>
        </div>
    </div>
</div>
