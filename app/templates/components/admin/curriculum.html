<!-- Tab: Curriculum -->
<div id="tab-curriculum" class="tab-content {% if active_admin_tab == 'curriculum' %}active{% endif %}">
    <div class="glass-panel" style="padding: 28px;">
        <!-- Header & Stats Overview Bar -->
        <div style="display: flex; flex-direction: column; gap: 20px; margin-bottom: 28px;">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
                <div>
                    <h2 style="font-size: 1.1rem; font-weight: 800; color: #fff; margin: 0; display: flex; align-items: center; gap: 10px; font-family: var(--font-data); letter-spacing: 1px;">
                        <i class="fas fa-book" style="color: var(--primary); filter: drop-shadow(0 0 8px var(--primary-glow));"></i>
                        CURRICULUM MANAGEMENT
                    </h2>
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin: 4px 0 0 0;">Manage training modules, vulnerability scores (CVSS), and lab access states.</p>
                </div>
            </div>

            <!-- Filter and Search Bar -->
            <div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: center; background: rgba(0, 0, 0, 0.4); padding: 12px 16px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05);">
                <div style="flex: 1; min-width: 200px; display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.03); padding: 8px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08);">
                    <i class="fas fa-search" style="color: var(--text-muted); font-size: 0.85rem;"></i>
                    <input type="text" id="curriculum-search" placeholder="Search lab by title, ID, or CWE..." style="background: transparent; border: none; color: #fff; outline: none; font-size: 0.85rem; width: 100%; font-family: var(--font-ui);">
                </div>

                <select id="curriculum-filter-category" style="background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255,255,255,0.12); color: #fff; padding: 8px 14px; border-radius: 8px; font-size: 0.85rem; outline: none; cursor: pointer;">
                    <option value="ALL" style="background: #0f172a; color: #fff;">All Categories</option>
                    <option value="Web Security" style="background: #0f172a; color: #fff;">Web Security</option>
                    <option value="Infrastructure" style="background: #0f172a; color: #fff;">Infrastructure</option>
                    <option value="Identity & Access" style="background: #0f172a; color: #fff;">Identity & Access</option>
                    <option value="Cloud Security" style="background: #0f172a; color: #fff;">Cloud Security</option>
                </select>

                <select id="curriculum-filter-status" style="background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255,255,255,0.12); color: #fff; padding: 8px 14px; border-radius: 8px; font-size: 0.85rem; outline: none; cursor: pointer;">
                    <option value="ALL" style="background: #0f172a; color: #fff;">All Statuses</option>
                    <option value="ACTIVE" style="background: #0f172a; color: #fff;">Active Only</option>
                    <option value="SUSPENDED" style="background: #0f172a; color: #fff;">Suspended Only</option>
                </select>
            </div>
        </div>

        <div class="panel-content" style="padding: 0;">
            <div class="lab-list"></div>
        </div>
    </div>
</div>

<!-- Modal: Edit Lab Module -->
<div id="labModal" class="modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);">
    <div class="glass-panel" style="width: 90%; max-width: 520px; padding: 28px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); background: rgba(13, 17, 23, 0.95); box-shadow: 0 20px 50px rgba(0,0,0,0.8);">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 16px;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div style="width: 32px; height: 32px; border-radius: 8px; background: rgba(0, 229, 155, 0.1); border: 1px solid rgba(0, 229, 155, 0.2); display: flex; align-items: center; justify-content: center; color: var(--primary);">
                    <i class="fas fa-edit"></i>
                </div>
                <h3 style="margin: 0; font-size: 1.05rem; font-weight: 700; color: #fff; font-family: var(--font-data);">EDIT LAB MODULE</h3>
            </div>
            <button onclick="document.getElementById('labModal').style.display='none'" style="background: transparent; border: none; color: #8b949e; font-size: 1.2rem; cursor: pointer; transition: var(--transition);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#8b949e'">✕</button>
        </div>

        <form id="labEditForm" style="display: flex; flex-direction: column; gap: 18px;">
            <input type="hidden" id="edit-lab-id">
            
            <div>
                <label style="display: block; font-size: 0.7rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.5px; font-family: var(--font-data);">LAB TITLE</label>
                <input type="text" id="edit-lab-title" required style="width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 8px; padding: 12px 14px; font-size: 0.85rem; outline: none; box-sizing: border-box;">
            </div>

            <div>
                <label style="display: block; font-size: 0.7rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.5px; font-family: var(--font-data);">CATEGORY</label>
                <select id="edit-lab-category" style="width: 100%; background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255,255,255,0.12); color: #fff; border-radius: 8px; padding: 12px 14px; font-size: 0.85rem; outline: none; box-sizing: border-box; cursor: pointer;">
                    <option value="Web Security" style="background: #0f172a; color: #fff;">Web Security</option>
                    <option value="Infrastructure" style="background: #0f172a; color: #fff;">Infrastructure</option>
                    <option value="Identity & Access" style="background: #0f172a; color: #fff;">Identity & Access</option>
                    <option value="Cloud Security" style="background: #0f172a; color: #fff;">Cloud Security</option>
                </select>
            </div>

            <div>
                <label style="display: block; font-size: 0.7rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.5px; font-family: var(--font-data);">CVSS SCORE (0.0 - 10.0)</label>
                <input type="number" step="0.1" min="0" max="10" id="edit-lab-cvss" required style="width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 8px; padding: 12px 14px; font-size: 0.85rem; outline: none; box-sizing: border-box;">
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.08);">
                <button type="button" onclick="document.getElementById('labModal').style.display='none'" class="btn btn-secondary btn-sm" style="padding: 10px 18px;">CANCEL</button>
                <button type="submit" class="btn btn-primary btn-sm" style="padding: 10px 18px;"><i class="fas fa-save"></i> SAVE CHANGES</button>
            </div>
        </form>
    </div>
</div>
