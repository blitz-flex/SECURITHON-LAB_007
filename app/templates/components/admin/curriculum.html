<!-- Tab: Curriculum -->
<div id="tab-curriculum" class="tab-content {% if active_admin_tab == 'curriculum' %}active{% endif %}">
    <div class="glass-panel" style="padding: 24px;">
        <div class="panel-header" style="margin-bottom: 20px;">
            <h2><i class="fas fa-book" style="color: var(--primary);"></i> Curriculum Lab Management</h2>
        </div>

        <div class="panel-content">
            <div class="lab-list"></div>
        </div>
    </div>
</div>

<!-- Modal: Edit Lab Module -->
<div id="labModal" class="modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
    <div class="glass-panel" style="width: 100%; max-width: 500px; padding: 24px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: #0e131f;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px;">
            <h3 style="margin: 0; font-size: 1.1rem; color: #fff;"><i class="fas fa-edit" style="color: var(--primary);"></i> Edit Lab Module</h3>
            <button onclick="document.getElementById('labModal').style.display='none'" style="background: transparent; border: none; color: #8b949e; font-size: 1.2rem; cursor: pointer;">✕</button>
        </div>

        <form id="labEditForm" style="display: flex; flex-direction: column; gap: 16px;">
            <input type="hidden" id="edit-lab-id">
            
            <div>
                <label style="display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 6px;">LAB TITLE</label>
                <input type="text" id="edit-lab-title" required style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 6px; padding: 10px; font-size: 0.85rem;">
            </div>

            <div>
                <label style="display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 6px;">CATEGORY</label>
                <select id="edit-lab-category" style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 6px; padding: 10px; font-size: 0.85rem;">
                    <option value="Web Security">Web Security</option>
                    <option value="Infrastructure">Infrastructure</option>
                    <option value="Identity & Access">Identity & Access</option>
                    <option value="Cloud Security">Cloud Security</option>
                </select>
            </div>

            <div>
                <label style="display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 6px;">CVSS SCORE (0.0 - 10.0)</label>
                <input type="number" step="0.1" min="0" max="10" id="edit-lab-cvss" required style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 6px; padding: 10px; font-size: 0.85rem;">
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 12px;">
                <button type="button" onclick="document.getElementById('labModal').style.display='none'" class="btn btn-secondary btn-sm">CANCEL</button>
                <button type="submit" class="btn btn-primary btn-sm"><i class="fas fa-save"></i> SAVE CHANGES</button>
            </div>
        </form>
    </div>
</div>
