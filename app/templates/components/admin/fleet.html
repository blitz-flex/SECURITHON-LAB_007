<!-- Tab: Fleet -->
<div id="tab-fleet" class="tab-content">
    <div class="dashboard-grid" style="grid-template-columns: 1fr 350px;">
        <div class="glass-panel">
            <div class="panel-header"><h2><i class="fas fa-users"></i> Fleet Operatives</h2><input type="text" id="fleetSearch" placeholder="Search codename..." style="padding: 4px 12px; width: 200px;"></div>
            <div class="panel-content"><table class="fleet-table"><thead><tr><th>Codename</th><th>Rank</th><th>XP</th><th>Status</th><th>Actions</th></tr></thead><tbody></tbody></table></div>
        </div>
        <div class="glass-panel">
            <div class="panel-header">
                <h2><i class="fas fa-clock"></i> Active Sessions</h2>
                <button class="btn btn-sm btn-danger" onclick="kickAllSessions()"><i class="fas fa-users-slash"></i> KICK ALL</button>
            </div>
            <div class="panel-content" id="sessionList"></div>
        </div>
    </div>
</div>
