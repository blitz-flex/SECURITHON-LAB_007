<!-- Tab: Fleet -->
<div id="tab-fleet" class="tab-content {% if active_admin_tab == 'fleet' %}active{% endif %}">
    <!-- Operational Statistics Cards -->
    <div class="stats-row" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px;">
        <div class="glass-panel" style="padding: 16px; display: flex; flex-direction: column; gap: 8px; border-radius: 8px; background: var(--bg-panel); border: 1px solid var(--border-light) !important;">
            <span style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600;"><i class="fas fa-users-cog"></i> Total Operatives</span>
            <span id="stat-total-operatives" style="font-size: 1.75rem; font-weight: 700; font-family: var(--font-data); color: var(--primary);">0</span>
        </div>
        <div class="glass-panel" style="padding: 16px; display: flex; flex-direction: column; gap: 8px; border-radius: 8px; background: var(--bg-panel); border: 1px solid var(--border-light) !important;">
            <span style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600;"><i class="fas fa-satellite-dish"></i> Active Sessions</span>
            <span id="stat-active-sessions" style="font-size: 1.75rem; font-weight: 700; font-family: var(--font-data); color: var(--secondary);">0</span>
        </div>
        <div class="glass-panel" style="padding: 16px; display: flex; flex-direction: column; gap: 8px; border-radius: 8px; background: var(--bg-panel); border: 1px solid var(--border-light) !important;">
            <span style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600;"><i class="fas fa-trophy"></i> Total XP</span>
            <span id="stat-total-xp" style="font-size: 1.75rem; font-weight: 700; font-family: var(--font-data); color: var(--warning);">0</span>
        </div>
        <div class="glass-panel" style="padding: 16px; display: flex; flex-direction: column; gap: 8px; border-radius: 8px; background: var(--bg-panel); border: 1px solid var(--border-light) !important;">
            <span style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600;"><i class="fas fa-chart-line"></i> Average XP</span>
            <span id="stat-avg-xp" style="font-size: 1.75rem; font-weight: 700; font-family: var(--font-data); color: #a855f7;">0</span>
        </div>
    </div>

    <style>
        /* Premium custom scrollbars for the panel content */
        .scrollable-panel {
            max-height: 400px;
            overflow-y: auto;
            position: relative;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
        }
        .scrollable-panel::-webkit-scrollbar {
            width: 4px;
        }
        .scrollable-panel::-webkit-scrollbar-track {
            background: transparent;
        }
        .scrollable-panel::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        .scrollable-panel::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
        .fleet-row:hover {
            background: rgba(255, 255, 255, 0.02);
        }
    </style>

    <div class="dashboard-grid" style="grid-template-columns: 1fr 350px;">
        <div class="glass-panel">
            <div class="panel-header">
                <h2><i class="fas fa-users"></i> Fleet Operatives</h2>
                <input type="text" id="fleetSearch" placeholder="Search codename, rank, or status..." style="padding: 6px 12px; width: 250px; background: rgba(0,0,0,0.4); border: 1px solid var(--border-light); border-radius: 4px; color: #fff; font-size: 0.82rem;">
            </div>
            <div class="panel-content" style="display: flex; flex-direction: column; padding: 0;">
                <!-- Fixed Header -->
                <div class="fleet-header" style="display: grid; grid-template-columns: 2fr 1fr 1fr 1.5fr 1fr; padding: 16px 20px; font-size: 0.7rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border-light); font-family: var(--font-ui); user-select: none;">
                    <div onclick="sortFleet('username')" style="cursor: pointer;">Codename <span id="sort-username-icon" style="opacity:0.4; font-size:0.75rem; margin-left:4px;">↕</span></div>
                    <div onclick="sortFleet('rank')" style="cursor: pointer;">Rank <span id="sort-rank-icon" style="opacity:0.4; font-size:0.75rem; margin-left:4px;">↕</span></div>
                    <div onclick="sortFleet('points')" style="cursor: pointer;">XP <span id="sort-points-icon" style="opacity:0.4; font-size:0.75rem; margin-left:4px;">↕</span></div>
                    <div onclick="sortFleet('is_active')" style="cursor: pointer;">Status <span id="sort-is_active-icon" style="opacity:0.4; font-size:0.75rem; margin-left:4px;">↕</span></div>
                    <div>Actions</div>
                </div>
                <!-- Scrollable list -->
                <div id="fleet-body-list" class="scrollable-panel">
                    <!-- JS renders items here -->
                </div>
            </div>
        </div>
        <div class="glass-panel">
            <div class="panel-header">
                <h2><i class="fas fa-clock"></i> Active Sessions</h2>
                <button class="btn btn-sm btn-danger" onclick="kickAllSessions()"><i class="fas fa-users-slash"></i> KICK ALL</button>
            </div>
            <div class="panel-content" id="sessionList"></div>
        </div>
    </div>
</div>
