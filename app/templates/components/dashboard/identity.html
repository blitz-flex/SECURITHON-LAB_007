<!-- ═══════════════ COL 1: IDENTITY ═══════════════ -->
<aside class="col-identity">

    <!-- Profile Card -->
    <div class="glass-panel profile-card">
        <div class="avatar-ring">
            <div class="avatar-inner" id="user-initials">ST</div>
        </div>
        <h2 class="t-header profile-name" id="user-fullname">Operator</h2>
        <div class="rank-badge" id="user-rank">RANK: RECRUIT</div>
    </div>
    <script>
        (function() {
            var name = localStorage.getItem('full_name') || localStorage.getItem('username') || 'Operator';
            var initials = name.trim().substring(0, 2).toUpperCase();
            var xp = parseInt(localStorage.getItem('user_xp') || '0', 10);
            var level = Math.floor(xp / 1000) + 1;
            var rankMap = {
                1: 'RECRUIT', 2: 'ROOKIE', 3: 'SCOUT', 4: 'ANALYST', 5: 'SPECIALIST',
                6: 'EXPERT', 7: 'SENIOR', 8: 'PRINCIPAL', 9: 'ELITE', 10: 'MASTER'
            };
            var rank = rankMap[Math.min(level, 10)] || 'RECRUIT';

            document.getElementById('user-fullname').innerText = name;
            document.getElementById('user-initials').innerText = initials;
            document.getElementById('user-rank').innerText = 'RANK: ' + rank;

            var progress = Math.round((xp % 1000) / 10);
            var deg = Math.round(progress * 3.6);
            var ring = document.querySelector('.avatar-ring');
            if (ring) {
                ring.style.background = 'conic-gradient(var(--primary-app) 0deg ' + deg + 'deg, rgba(255, 255, 255, 0.08) ' + deg + 'deg 360deg)';
                ring.title = 'Level Progress: ' + progress + '% (' + (xp % 1000) + ' / 1000 XP to next level)';
            }
        })();
    </script>

    <!-- Tactical Status -->
    <div class="glass-panel status-panel">
        <h3 class="t-section-title"><i class="fas fa-microchip"></i> Tactical Status</h3>
        <div class="stat-item">
            <div class="stat-label">
                <span class="t-mono">Security Node</span>
                <span class="stat-sublabel" id="security-node-sublabel">Standby · Awaiting ops</span>
            </div>
            <div class="progress-ring-container">
                <svg width="56" height="56" viewBox="0 0 56 56" aria-hidden="true">
                    <circle fill="transparent" stroke="rgba(63,185,80,0.1)" stroke-width="4" r="24" cx="28" cy="28"/>
                    <circle id="security-node-ring" class="progress-ring__circle" stroke="var(--primary-app)" stroke-width="4"
                        fill="transparent" r="24" cx="28" cy="28"
                        style="stroke-dasharray: 150.8; stroke-dashoffset: 150.8;"/>
                </svg>
                <div class="progress-label" id="security-node-pct" style="color: var(--primary-app);">0%</div>
            </div>
        </div>

        <div class="skill-matrix-block">
            <h4 class="t-section-title skill-matrix-title">SKILL MATRIX</h4>

            <div class="skill-matrix-rows">
                <div class="skill-row" title="Solved Web Security / exploitation labs">
                    <div class="skill-row-header">
                        <span class="t-mono">Exploitation</span>
                        <span id="skill-exploitation-pct" class="skill-pct skill-pct--green">0%</span>
                    </div>
                    <div class="xp-progress-track"><div id="skill-exploitation-bar" class="xp-progress-fill skill-bar--green" style="width: 0%;"></div></div>
                </div>
                <div class="skill-row" title="Solved identity and defensive-hardening labs">
                    <div class="skill-row-header">
                        <span class="t-mono">Defense</span>
                        <span id="skill-defense-pct" class="skill-pct skill-pct--blue">0%</span>
                    </div>
                    <div class="xp-progress-track"><div id="skill-defense-bar" class="xp-progress-fill skill-bar--blue" style="width: 0%;"></div></div>
                </div>
                <div class="skill-row" title="Measured solve efficiency after successful submissions">
                    <div class="skill-row-header">
                        <span class="t-mono">Analysis</span>
                        <span id="skill-analysis-pct" class="skill-pct skill-pct--amber">0%</span>
                    </div>
                    <div class="xp-progress-track"><div id="skill-analysis-bar" class="xp-progress-fill skill-bar--amber" style="width: 0%;"></div></div>
                </div>
                <div class="skill-row" title="Solved cloud, infrastructure-as-code, and Kubernetes labs">
                    <div class="skill-row-header">
                        <span class="t-mono">Cloud Security</span>
                        <span id="skill-cloud-pct" class="skill-pct skill-pct--purple">0%</span>
                    </div>
                    <div class="xp-progress-track"><div id="skill-cloud-bar" class="xp-progress-fill skill-bar--purple" style="width: 0%;"></div></div>
                </div>
                <div class="skill-row" title="Measured static patch-quality score from successful submissions">
                    <div class="skill-row-header">
                        <span class="t-mono">Clean Code</span>
                        <span id="skill-clean-code-pct" class="skill-pct skill-pct--green">—</span>
                    </div>
                    <div class="xp-progress-track"><div id="skill-clean-code-bar" class="xp-progress-fill skill-bar--green" style="width: 0%;"></div></div>
                </div>
            </div>
        </div>

    </div>
</aside>
