<header class="topbar">
    <a href="/dashboard" class="logo">
        <div class="logo-icon"><i class="fas fa-shield-halved"></i></div>
        <div class="logo-text">SECURITHON <span>LAB</span></div>
    </a>
    
    <nav class="nav-tabs">
        <a href="/dashboard" class="nav-tab {% if active_page == 'dashboard' %}active{% endif %}">
            <div class="circle-indicator"></div> Dashboard
        </a>

        <a href="/archive" class="nav-tab {% if active_page == 'archive' %}active{% endif %}">
            <div class="circle-indicator"></div> Incident Archive
        </a>
        <a href="/admin" class="nav-tab {% if active_page == 'admin' %}active{% endif %}">
            <div class="circle-indicator"></div> Admin OCC
        </a>
    </nav>

    <div class="topbar-right">
        <div class="rank-pill" id="topbar-rank">RECRUIT</div>
        <div class="pts-pill" id="topbar-pts">0 XP</div>
        <div class="user-menu-container" style="position: relative; display: inline-flex; align-items: center;">
            <button class="user-profile" id="userMenuBtn" style="width: 36px; height: 36px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; padding: 0; vertical-align: middle; font-family: monospace; font-weight: bold; font-size: 0.8rem; line-height: 1; box-sizing: border-box;"><i class="fas fa-user"></i></button>
            <script>
                (function() {
                    const name = localStorage.getItem('full_name') || localStorage.getItem('username') || '';
                    const points = parseInt(localStorage.getItem('user_xp') || '0');
                    const lvl = Math.floor(points / 1000) + 1;
                    const isSuper = localStorage.getItem('is_admin') === 'true';
                    const rankMap = {1:'Recruit', 2:'Rookie', 3:'Scout', 4:'Analyst', 5:'Specialist', 6:'Expert', 7:'Senior', 8:'Principal', 9:'Elite', 10:'Master'};
                    const rank = (rankMap[Math.min(lvl, 10)] || 'Recruit').toUpperCase();
                    
                    const ptsPill = document.getElementById('topbar-pts');
                    const rankPill = document.getElementById('topbar-rank');
                    if (ptsPill && !isSuper) ptsPill.innerText = points.toLocaleString() + ' XP';
                    if (rankPill && !isSuper) rankPill.innerText = rank;

                    const btn = document.getElementById('userMenuBtn');
                    if (btn) {
                        if (isSuper) {
                            btn.innerHTML = '<i class="fas fa-user-shield"></i>';
                        } else if (name) {
                            btn.innerText = name.substring(0, 2).toUpperCase();
                        }
                    }
                })();
            </script>
            <div class="user-dropdown" id="userDropdown">
                <a href="/settings"><i class="fas fa-cog"></i> Settings</a>
                <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.05); margin: 4px 0;">
                <a href="#" onclick="logout()" style="color: var(--error);"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>
    </div>
</header>
