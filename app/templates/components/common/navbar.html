<header class="topbar">
    <a href="/dashboard" class="logo" style="display: flex; align-items: center; gap: 10px;">
        <img src="{{ url_static('img/logo.jpg') }}" alt="Securithon Logo" style="width: 40px; height: 40px; border-radius: 8px; border: 1px solid rgba(63,185,80,0.3); filter: saturate(1.1) brightness(1.05); box-shadow: 0 0 10px rgba(63,185,80,0.25);">
        <div class="logo-text">SECURITHON <span>LAB</span></div>
    </a>
    
    <nav class="nav-tabs">
        <a href="/dashboard" class="nav-tab {% if active_page == 'dashboard' %}active{% endif %}">
            <div class="circle-indicator"></div> Dashboard
        </a>

        <a href="/leaderboard" class="nav-tab {% if active_page == 'leaderboard' %}active{% endif %}">
            <div class="circle-indicator"></div> Leaderboard
        </a>
        <a href="/archive" class="nav-tab {% if active_page == 'archive' %}active{% endif %}">
            <div class="circle-indicator"></div> Incident Archive
        </a>
        <a href="/admin" class="nav-tab {% if active_page == 'admin' %}active{% endif %}">
            <div class="circle-indicator"></div> Admin OCC
        </a>
    </nav>

    <div class="topbar-right">
        <script>
            (function () {
                const isAdmin = localStorage.getItem('is_admin') === 'true'
                    || localStorage.getItem('username') === 'admin';
                if (isAdmin) document.documentElement.classList.add('is-admin-mode');
            })();
        </script>
        <div class="rank-pill" id="topbar-rank">RECRUIT</div>
        <div class="pts-pill" id="topbar-pts">0 XP</div>
        <div class="user-menu-container">
            <button class="user-profile" id="userMenuBtn"><i class="fas fa-user"></i></button>
            <script>
                (function() {
                    const name = localStorage.getItem('full_name') || localStorage.getItem('username') || '';
                    const points = parseInt(localStorage.getItem('user_xp') || '0', 10);
                    const lvl = Math.floor(points / 1000) + 1;
                    const isAdmin = localStorage.getItem('is_admin') === 'true'
                        || localStorage.getItem('username') === 'admin';
                    const rankMap = {1:'Recruit', 2:'Rookie', 3:'Scout', 4:'Analyst', 5:'Specialist', 6:'Expert', 7:'Senior', 8:'Principal', 9:'Elite', 10:'Master'};
                    const rank = (rankMap[Math.min(lvl, 10)] || 'Recruit').toUpperCase();

                    const ptsPill = document.getElementById('topbar-pts');
                    const rankPill = document.getElementById('topbar-rank');
                    if (!isAdmin) {
                        if (ptsPill) ptsPill.innerText = points.toLocaleString() + ' XP';
                        if (rankPill) rankPill.innerText = rank;
                    }

                    const btn = document.getElementById('userMenuBtn');
                    if (btn && isAdmin) {
                        btn.innerHTML = '<i class="fas fa-user-shield"></i>';
                    } else if (btn && name) {
                        btn.innerText = name.substring(0, 2).toUpperCase();
                    }
                })();
            </script>
            <div class="user-dropdown" id="userDropdown">
                <a href="/settings"><i class="fas fa-cog"></i> Settings</a>
                <hr class="dropdown-divider">
                <a href="#" onclick="logout()" class="logout-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>
    </div>
</header>

<nav class="mobile-bottom-bar">
    <a href="/dashboard" class="mobile-tab {% if active_page == 'dashboard' %}active{% endif %}">
        <i class="fas fa-home"></i>
        <span>Home</span>
    </a>
    <a href="#" onclick="event.preventDefault(); navigateToActiveArena();" class="mobile-tab {% if active_page == 'arena' %}active{% endif %}">
        <i class="fas fa-laptop-code"></i>
        <span>Arena</span>
    </a>
    <script>
        function navigateToActiveArena() {
            const username = localStorage.getItem('username') || 'guest';
            const activeChallenge = localStorage.getItem(`lab_challenge_id_${username}`);
            const track = localStorage.getItem(`selected_track_${username}`);
            if (activeChallenge) {
                if (track === 'appsec') {
                    window.location.href = '/appsec';
                } else {
                    window.location.href = '/arena';
                }
            } else {
                window.location.href = '/arena';
            }
        }
    </script>
    <a href="/leaderboard" class="mobile-tab {% if active_page == 'leaderboard' %}active{% endif %}">
        <i class="fas fa-trophy"></i>
        <span>Rank</span>
    </a>
    <a href="/archive" class="mobile-tab {% if active_page == 'archive' %}active{% endif %}">
        <i class="fas fa-database"></i>
        <span>Archive</span>
    </a>
    <!-- Admin Link for mobile will be handled dynamically or in settings -->
</nav>
