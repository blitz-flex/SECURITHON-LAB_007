<section id="consolePanel" class="glass-panel">
    <div class="panel-header">
        <span class="t-section-title" style="margin:0;"><i class="fas fa-terminal"></i> Attack Console</span>
        <span id="consoleStatus" class="t-mono" style="color: var(--primary-app); font-size: 0.7rem; font-weight: 700;"><i class="fas fa-circle" style="font-size:0.5rem; vertical-align:middle; margin-right:4px;"></i> MONITORING</span>
    </div>
    <div class="console-body" id="consoleBody"></div>
    <div class="console-input-area">
        <span style="color: var(--primary-app); font-family: var(--font-mono); font-size: 0.9rem; font-weight: 700;">$</span>
        <input type="text" id="consoleInput" placeholder="Inject manual payload..." style="flex: 1; background: transparent; border: none; outline: none; color: var(--text-primary); font-family: var(--font-mono); font-size: 0.85rem;">
    </div>
</section>
