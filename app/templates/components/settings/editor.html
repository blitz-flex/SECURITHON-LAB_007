<section class="settings-section" id="editor">
    <div class="section-grid">
        <div class="col-left">
            <div class="card">
                <h4><i class="fas fa-eye"></i> Visual Theme</h4>
                <div class="form-group">
                    <label class="form-label">Workspace Theme</label>
                    <select class="form-control" id="editor-theme-select">
                        <option value="default">Securithon Dark (Default)</option>
                        <option value="dracula">Dracula (Popular)</option>
                        <option value="nord">Nord (Cool & Calm)</option>
                        <option value="gruvbox">Gruvbox Dark (Warm)</option>
                        <option value="cyberpunk">Cyberpunk Neon</option>
                        <option value="high-contrast">High Contrast</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="col-right">
            <div class="card">
                <h4><i class="fas fa-font"></i> Typography</h4>
                <div class="form-group">
                    <label class="form-label">Editor Font</label>
                    <select class="form-control" id="editor-font-select">
                        <option value="jetbrains">JetBrains Mono</option>
                        <option value="fira">Fira Code</option>
                        <option value="roboto">Roboto Mono</option>
                        <option value="source">Source Code Pro</option>
                        <option value="consolas">Consolas</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
</section>
