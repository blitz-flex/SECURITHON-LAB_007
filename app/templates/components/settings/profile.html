<section class="settings-section settings-tab {% if (active_settings_tab or 'profile') == 'profile' %}active{% endif %}" id="profile">
    <div class="settings-bento settings-bento--2">
        <div class="glass-panel">
            <div class="panel-header">
                <h2><i class="fas fa-id-card"></i> Profile Identity</h2>
            </div>
            <div class="panel-content">
                <p class="panel-desc">How you appear across the platform.</p>
                <div class="form-group">
                    <label class="form-label" for="display-name-input">Display name</label>
                    <input type="text" id="display-name-input" class="form-control" placeholder="Your name" autocomplete="nickname">
                </div>
                <div class="form-group form-group--last">
                    <label class="form-label" for="spec-trigger">Specialization</label>
                    <div class="custom-select-wrapper" id="specialization-wrapper">
                        <div class="custom-select-trigger" id="spec-trigger" tabindex="0" role="button" aria-haspopup="listbox" aria-expanded="false">
                            <span class="custom-select-value" id="spec-value">Red Team / Pentesting</span>
                            <i class="fas fa-chevron-down custom-select-chevron" aria-hidden="true"></i>
                        </div>
                        <div class="custom-options" id="spec-options" role="listbox">
                            <div class="custom-option selected" data-value="Red Team / Pentesting">Red Team / Pentesting</div>
                            <div class="custom-option" data-value="Blue Team / Defense">Blue Team / Defense</div>
                            <div class="custom-option" data-value="Security Researcher">Security Researcher</div>
                            <div class="custom-option" data-value="DevSecOps Engineer">DevSecOps Engineer</div>
                            <div class="custom-option" data-value="Malware Analyst">Malware Analyst</div>
                            <div class="custom-option" data-value="OSINT Operator">OSINT Operator</div>
                        </div>
                        <input type="hidden" id="specialization-input" value="Red Team / Pentesting">
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-panel glass-panel--progress">
            <div class="panel-header">
                <h2><i class="fas fa-chart-line"></i> Operative Progress</h2>
                <span class="badge badge-elite">SYNCED</span>
            </div>
            <div class="panel-content progress-panel">
                <div class="progress-hero">
                    <div class="progress-rank-badge" aria-hidden="true">
                        <i class="fas fa-shield-halved"></i>
                    </div>
                    <div class="progress-hero-text">
                        <span class="progress-hero-label">Current rank</span>
                        <span class="progress-rank-value" id="profile-rank">RECRUIT</span>
                    </div>
                </div>

                <div class="progress-xp-card">
                    <div class="progress-xp-row">
                        <span class="progress-xp-label">Experience points</span>
                        <span class="progress-xp-value"><span id="profile-xp">0</span> XP</span>
                    </div>
                    <div class="bar-container progress-bar">
                        <div class="bar-fill xp-bar-fill" id="xp-bar-fill" style="width: 0%"></div>
                    </div>
                    <div class="progress-xp-meta">
                        <span id="profile-xp-into">0 / 1,000 XP</span>
                        <span id="profile-xp-next">1,000 XP to next rank</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
