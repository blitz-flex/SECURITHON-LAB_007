<div class="settings-action-bar" id="settings-action-bar" aria-hidden="true">
    <span class="settings-action-bar__hint">You have unsaved changes</span>
    <button type="button" class="btn btn-secondary" onclick="discardChanges(event)">Discard</button>
    <button type="button" class="btn btn-primary" id="btn-apply-settings" onclick="saveSettings(event)">Apply Changes</button>
</div>
