<section class="settings-section" id="security">
    <div class="section-grid">
        <div class="col-left">
            <div class="card">
                <h4><i class="fas fa-shield-halved"></i> Access Credentials</h4>
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" class="form-control" placeholder="••••••••••••">
                </div>
                <div class="form-group">
                    <label class="form-label">Verify Password</label>
                    <input type="password" class="form-control" placeholder="••••••••••••">
                </div>
            </div>
        </div>
        <div class="col-right">
            <div class="card">
                <h4><i class="fas fa-fingerprint"></i> Multi-Factor Authentication</h4>
                <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 2rem;">Secure your account with hardware or software-based 2FA.</p>
                <button class="btn-save" style="background: var(--accent); color: #fff; width: 100%;">Enable 2FA</button>
            </div>
        </div>
    </div>
</section>
