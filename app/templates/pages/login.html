<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Securithon Lab</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="{{ url_static('favicon.ico') }}?v=securithon">
    
    <!-- Core & Page Styles -->
    <link rel="stylesheet" href="{{ url_static('css/base.css') }}">
    <link rel="stylesheet" href="{{ url_static('css/pages/auth.css') }}">
</head>
<body>
    <div class="noise-bg"></div>
    
    <div class="auth-card">
        <div class="auth-header">
            <a href="/" class="logo-text">SECURITHON <span>LAB</span></a>
            <h2>Welcome <span style="color: var(--primary-app);">Back</span></h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Initialize your security session.</p>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm">
            <div class="form-group" id="credentials-username-group">
                <label>Operator Handle</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>
            <div class="form-group" id="credentials-password-group">
                <label>Security Key</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <div class="form-group" id="mfa-group" style="display: none;">
                <label>Two-Factor Auth Code</label>
                <input type="text" id="mfa_code" placeholder="6-digit code" maxlength="6" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code">
            </div>
            <button type="submit" class="btn-auth" id="submitBtn">
                Initialize Login <i class="fas fa-bolt"></i>
            </button>
        </form>

        <div class="auth-footer">
            No clearance level yet? <a href="/register">Register here</a>
        </div>
    </div>

    <!-- Page Logic -->
    <script src="{{ url_static('js/pages/login.js') }}?v={{ range(1, 10000) | random }}"></script>
</body>
</html>
